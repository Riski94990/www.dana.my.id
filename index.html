<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi BOSP Salur - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for consistent look -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
        }

        .login-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <div class="text-center mb-8">
        <img src="https://img.sanishtech.com/u/2affb8d157b1efecae4163ec9df2c797.png" 
             alt="Logo BOSP" 
             class="h-20 mx-auto mb-2 object-contain"
             onerror="this.src='https://via.placeholder.com/200x80?text=BOSP+LOGO'">
        <h1 class="text-2xl font-normal text-gray-600">Sistem Informasi <span class="font-bold text-gray-800">BOSP</span></h1>
        <h2 class="text-3xl font-medium text-gray-700">Salur</h2>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white p-8 rounded-sm w-full max-w-md login-card border border-gray-100">
        <p class="text-center text-gray-500 mb-6 text-sm">Login untuk masuk</p>

        <form id="loginForm" class="space-y-4">
            <!-- Username -->
            <div class="input-icon-wrapper">
                <input type="text" 
                       placeholder="Username" 
                       class="w-full border border-gray-300 p-2.5 pr-10 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-700"
                       required>
                <i data-lucide="mail" class="input-icon w-5 h-5"></i>
            </div>

            <!-- Password -->
            <div class="input-icon-wrapper">
                <input type="password" 
                       placeholder="Password" 
                       class="w-full border border-gray-300 p-2.5 pr-10 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-700"
                       required>
                <i data-lucide="lock" class="input-icon w-5 h-5"></i>
            </div>

            <!-- Login Type -->
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-600">Login Type</label>
                <select class="w-full border border-gray-300 p-2.5 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-gray-700 appearance-none cursor-pointer">
                    <option value="bank">Bank</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                </select>
            </div>

            <!-- Sign In Button -->
            <button type="submit" 
                    class="w-full bg-[#007bff] hover:bg-blue-600 text-white font-medium py-2.5 rounded transition-colors mt-2">
                Sign In
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-8 flex items-center space-x-2 text-sm">
            <span class="text-red-500">Klik jika</span>
            <a href="#" class="bg-[#ffc107] hover:bg-yellow-500 text-gray-800 px-3 py-1 rounded font-medium transition-colors">
                Reset/Lupa Password
            </a>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="toast" class="fixed bottom-5 right-5 hidden bg-white border-l-4 border-blue-500 p-4 shadow-lg rounded transform transition-all duration-300 translate-y-20">
        <div class="flex items-center">
            <div class="flex-shrink-0">
                <i data-lucide="info" class="w-5 h-5 text-blue-500"></i>
            </div>
            <div class="ml-3">
                <p class="text-sm text-gray-700 font-medium" id="toastMessage"></p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Form Submission Logic
        const loginForm = document.getElementById('loginForm');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('hidden', 'translate-y-20');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            showToast("Mencoba melakukan autentikasi...");
        });

        // Dummy link interaction
        document.querySelector('a').addEventListener('click', (e) => {
            e.preventDefault();
            showToast("Fungsi Lupa Password belum tersedia.");
        });
    </script>
</body>
</html>
