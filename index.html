<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container utama menggunakan aspek rasio 1080x1920 */
        .immersive-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://img.sanishtech.com/u/9b412125828478819861c495536103ec.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Overlay halus untuk kontras elemen */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        /* Elemen Play Tengah */
        .play-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .play-btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #fff;
            margin-left: 6px;
        }

        /* Info kecil di bawah */
        .bottom-bar {
            position: absolute;
            bottom: 40px;
            width: 85%;
            z-index: 10;
            text-align: center;
        }

        .video-progress {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
            margin-bottom: 10px;
        }

        .video-progress-fill {
            width: 25%;
            height: 100%;
            background: #ff0000;
        }

        .small-meta {
            font-size: 9px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: sans-serif;
            margin-top: 15px;
        }

        .watch-now-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Pulse Animation */
        .pulse {
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .ripple-effect {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.5);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="immersive-wrapper" onclick="redirectToAdsterra()">
        <div class="vignette"></div>

        <div class="play-container">
            <div class="play-btn">
                <div class="ripple-effect pulse"></div>
                <div class="play-icon"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="video-progress">
                <div class="video-progress-fill"></div>
            </div>
            <div class="flex justify-between text-[10px] text-white opacity-80 font-mono mb-6">
                <span>02:14</span>
                <span>15:30</span>
            </div>
            
            <a href="#" class="watch-now-btn">Nonton Sekarang</a>
            
            <div class="small-meta">HD STREAMING • 1080P • PRIVATE CONTENT</div>
        </div>
    </div>

    <script>
        // Link Smartlink Adsterra Anda
        const smartlink = "https://www.profitablecpmratenetwork.com/jvu5qb7418?key=f65c61318b4bd3cf8af3756c7a5eb3dd";

        function redirectToAdsterra() {
            // Pengalihan cepat saat area mana pun diklik
            window.location.href = smartlink;
        }

        // Mencegah menu konteks klik kanan
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
